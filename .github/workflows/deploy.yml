name: Deploy Blog

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 统一 locale 避免某些依赖因环境差异输出中文或报错
      LANG: en_US.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 pnpm (不自动执行 install)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      # 设置 Node 并启用 pnpm 缓存
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static files
        run: pnpm docs:build

      - name: Revision homepage assets
        run: pnpm homepage:rev

      # 配置 SSH (使用私钥 secret)
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.BLOG_SERVER_SSH_KEY }}

      - name: Add known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.BLOG_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy (rsync)
        env:
          BLOG_SERVER_USER: ${{ secrets.BLOG_SERVER_USER }}
          BLOG_SERVER_HOST: ${{ secrets.BLOG_SERVER_HOST }}
          BLOG_PATH: ${{ secrets.BLOG_PATH }}
        run: |
          rsync -avz --delete ./docs/.vitepress/dist/ $BLOG_SERVER_USER@$BLOG_SERVER_HOST:$BLOG_PATH/blog/
          rsync -avz ./homepage/ $BLOG_SERVER_USER@$BLOG_SERVER_HOST:$BLOG_PATH/homepage/

      - name: Ensure Nginx container is running
        env:
          BLOG_SERVER_USER: ${{ secrets.BLOG_SERVER_USER }}
          BLOG_SERVER_HOST: ${{ secrets.BLOG_SERVER_HOST }}
          BLOG_PATH: ${{ secrets.BLOG_PATH }}
          BLOG_CONTAINER_NAME: ${{ secrets.BLOG_CONTAINER_NAME }}
          BLOG_CONTAINER_IMAGE: ${{ secrets.BLOG_CONTAINER_IMAGE }}
          BLOG_CONTAINER_PORT: ${{ secrets.BLOG_CONTAINER_PORT }}
        run: |
          CONTAINER_NAME="${BLOG_CONTAINER_NAME:-myblog}"
          CONTAINER_IMAGE="${BLOG_CONTAINER_IMAGE:-nginx:alpine}"
          CONTAINER_PORT="${BLOG_CONTAINER_PORT:-80:80}"

          ssh $BLOG_SERVER_USER@$BLOG_SERVER_HOST \
            "BLOG_PATH='$BLOG_PATH' CONTAINER_NAME='$CONTAINER_NAME' CONTAINER_IMAGE='$CONTAINER_IMAGE' CONTAINER_PORT='$CONTAINER_PORT' bash -s" <<'EOF'
          set -euo pipefail

          if docker ps -a --format '{{.Names}}' | grep -Fxq "$CONTAINER_NAME"; then
            echo "Container '$CONTAINER_NAME' exists, restarting..."
            docker restart "$CONTAINER_NAME"
          else
            echo "Container '$CONTAINER_NAME' not found, creating from '$CONTAINER_IMAGE'..."
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p "$CONTAINER_PORT" \
              -v "$BLOG_PATH/blog:/usr/share/nginx/html/blog:ro" \
              -v "$BLOG_PATH/homepage:/usr/share/nginx/html/homepage:ro" \
              "$CONTAINER_IMAGE"
          fi
          EOF
